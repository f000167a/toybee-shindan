@keyframes resultPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

"マ ✨ マホウ (まほうつかい)","ミ 🪞 ミラー (かがみ)","ム 💜 ムラサキ","メ 👸 メイク (おケショウ)","モ 🍑 モモ (ピーチ♪)",

"ザ 📖 ザッシ (エホン)","ジ 🧲 ジシャク","ズ 🖍️ ズコウ (おエカキ♪)","ゼ 🍮 ゼリー (オヤツ)","ゾ 🐘 ゾウ (オオキイ！)",
"ダ 🤗 ダイスキ！","ヂ 🩹 ハナヂ","ヅ 🫙 ツケモノ (おヅケモノ)","デ 🚪 デグチ (おデカケ)","ド 🚗 ドライブ (おデカケ♪)",

var PR=["すごーい！👸✨","おひめさま みたい！👑","きらきら〜！💎","まほうつかい だね！🪄","かわいい〜！🎀","100てん！💖","ぱーふぇくと！⭐","すてき〜！🌸","やったね！🎉","てんさい！🌈","プリキュア みたい！💫","プリンセス！👸💖"];
var GC=["#FF69B4","#B388FF","#87CEEB","#FFB6D9","#FFEAA7","#DDA0DD","#FF9FF3","#54A0FF","#E8D5F5","#FFD700","#FF6348","#48DBFB","#A29BFE","#FD79A8","#00B894"];
var PCS=["#FF69B4","#B388FF","#222222","#87CEEB","#FFD700","#FF6348","#2ED573","#FF9FF3"];

var mode="hiragana",grp=0,ch=null,isQuiz=false;
var qCh=null,qOpts=[],qRes=null,score=0,streak=0,praise="";
var penCol="#FF69B4",penSz=6,showCf=false;
var cvs=null,drawing=false,lastPt=null;
var cfTimer=null;
var judgeResult=null,judgeTimer=null;
var hasStrokes=false;
var CW=500;

function getGroups(){return mode==="hiragana"?HG:KG;}
function getChars(g){return g.slice(1);}
function allRomaji(){var o={};for(var k in R)o[R[k]]=1;return Object.keys(o);}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

function drawGuide(){
  if(!cvs)return;
  var x=cvs.getContext("2d");
  x.clearRect(0,0,CW,CW);
  x.strokeStyle="#F5D0E0";x.lineWidth=1;x.setLineDash([8,8]);
  x.beginPath();x.moveTo(CW/2,0);x.lineTo(CW/2,CW);x.moveTo(0,CW/2);x.lineTo(CW,CW/2);x.stroke();
  x.setLineDash([]);
  if(ch){
    var fs=Math.round(CW*0.65);
    x.font="600 "+fs+"px 'YuKyokasho Yoko','YuKyokasho','Klee One',serif";x.fillStyle="rgba(255,182,217,.2)";x.textAlign="center";x.textBaseline="middle";x.fillText(ch,CW/2,CW/2+CW*0.02);
  }
  hasStrokes=false;
  judgeResult=null;
}

function getPos(e){
  var r=cvs.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-r.left)*(CW/r.width),y:(t.clientY-r.top)*(CW/r.height)};
}
function onDown(e){e.preventDefault();drawing=true;lastPt=getPos(e);}
function onMove(e){
  e.preventDefault();if(!drawing||!cvs)return;
  var x=cvs.getContext("2d"),p=getPos(e);
  x.strokeStyle=penCol;x.lineWidth=penSz*(CW/340);x.lineCap="round";x.lineJoin="round";
  x.beginPath();x.moveTo(lastPt.x,lastPt.y);x.lineTo(p.x,p.y);x.stroke();
  lastPt=p;hasStrokes=true;
}
function onUp(e){e.preventDefault();drawing=false;lastPt=null;}

function setupCanvas(){
  cvs=document.getElementById("dc");
  if(!cvs)return;
  drawGuide();
  cvs.addEventListener("mousedown",onDown);
  cvs.addEventListener("mousemove",onMove);
  cvs.addEventListener("mouseup",onUp);
  cvs.addEventListener("mouseleave",onUp);
  cvs.addEventListener("touchstart",onDown,{passive:false});
  cvs.addEventListener("touchmove",onMove,{passive:false});
  cvs.addEventListener("touchend",onUp,{passive:false});
}

function judgeHandwriting(){
  if(!cvs||!ch||!hasStrokes)return;
  var ref=document.getElementById("refCvs");
  ref.width=CW;ref.height=CW;
  var rx=ref.getContext("2d");
  rx.clearRect(0,0,CW,CW);
  var fs=Math.round(CW*0.65);
  rx.font="600 "+fs+"px 'YuKyokasho Yoko','YuKyokasho','Klee One',serif";
  rx.fillStyle="#000000";
  rx.textAlign="center";
  rx.textBaseline="middle";
  rx.fillText(ch,CW/2,CW/2+CW*0.02);

  var refData=rx.getImageData(0,0,CW,CW).data;
  var drawnData=cvs.getContext("2d").getImageData(0,0,CW,CW).data;

  var refPx=0,drawnPx=0,overlap=0;
  var step=4;
  for(var i=0;i<refData.length;i+=4*step){
    var rA=refData[i+3]>30;
    var dR=drawnData[i],dG=drawnData[i+1],dB=drawnData[i+2],dA=drawnData[i+3];
    var isGuide=(dA>20&&dA<120&&dR>200&&dG>150&&dB>180);
    var isGrid=(dA>10&&dA<80&&dR>220&&dG>180);
    var dPx=dA>40&&!isGuide&&!isGrid;

    if(rA)refPx++;
    if(dPx)drawnPx++;
    if(rA&&dPx)overlap++;
  }

  if(refPx===0||drawnPx===0){judgeResult={level:0};renderJudge();if(judgeTimer)clearTimeout(judgeTimer);judgeTimer=setTimeout(function(){drawGuide();judgeResult=null;var ja=document.getElementById("judgeArea");if(ja)ja.innerHTML="";},2500);return;}
  var coverage=overlap/refPx;
  var precision=overlap/drawnPx;
  var fScore=(coverage*precision)>0?2*(coverage*precision)/(coverage+precision):0;
  var spread=drawnPx/refPx;

  var level=0;
  if(fScore>0.28&&coverage>0.25)level=3;
  else if(fScore>0.18&&coverage>0.15)level=2;
  else if(coverage>0.08||drawnPx>refPx*0.15)level=1;

  if(spread>2.5)level=Math.min(level,1);

  judgeResult={level:level,coverage:Math.round(coverage*100),fScore:Math.round(fScore*100)};
  renderJudge();
  if(judgeTimer)clearTimeout(judgeTimer);
  if(level>=2){
    doConfetti();
    judgeTimer=setTimeout(function(){advanceChar();},3800);
  }else{
    judgeTimer=setTimeout(function(){
      drawGuide();
      judgeResult=null;
      var ja=document.getElementById("judgeArea");if(ja)ja.innerHTML="";
    },2500);
  }
}

function advanceChar(){
  var gs=getGroups(),chars=getChars(gs[grp]);
  var idx=chars.indexOf(ch);
  if(idx<chars.length-1){
    ch=chars[idx+1];
  }else if(grp<gs.length-1){
    grp++;ch=getChars(gs[grp])[0];
  }else{
    grp=0;ch=getChars(gs[0])[0];
  }
  judgeResult=null;render();
}

function renderJudge(){
  var el=document.getElementById("judgeArea");
  if(!el||!judgeResult)return;
  var lv=judgeResult.level;
  var msgs=[
    ["もういっかい かいてみよう！🌱","#C9A0DC"],
    ["おしい！もうちょっと！💪✨","#54A0FF"],
    ["じょうず！すてき〜！🌸","#FF69B4"],
    ["はなまる！てんさい！🌟👑💖","#FFD700"]
  ];
  var m=msgs[lv];
  var stars="";
  for(var i=0;i<3;i++){
    if(i<lv)stars+="<span style=\"font-size:clamp(36px,8vw,48px);animation:popIn .4s ease-out "+(i*0.15)+"s both\">⭐</span>";
    else stars+="<span style=\"font-size:clamp(36px,8vw,48px);opacity:.3;filter:grayscale(1)\">⭐</span>";
  }
  var gs=getGroups(),chars=getChars(gs[grp]);
  var idx=chars.indexOf(ch),nextCh="";
  if(idx<chars.length-1)nextCh=chars[idx+1];
  else if(grp<gs.length-1)nextCh=getChars(gs[grp+1])[0];
  else nextCh=getChars(gs[0])[0];
  var nextHtml="";
  if(nextCh&&lv>=2)nextHtml="<div style=\"margin-top:6px;font-size:clamp(12px,3vw,14px);color:#C9A0DC\">つぎの もじ → <span style=\"font-size:clamp(18px,4vw,22px);font-weight:900;color:#FF69B4\">"+nextCh+"</span></div>";

  el.innerHTML="<div style=\"animation:resultPop .4s ease-out;text-align:center;padding:16px 12px;background:rgba(255,255,255,.97);border-radius:20px;border:3px solid "+m[1]+";box-shadow:0 6px 30px "+m[1]+"55\">"
    +"<div style=\"margin-bottom:4px\">"+stars+"</div>"
    +"<div style=\"font-size:clamp(16px,4vw,22px);font-weight:900;color:"+m[1]+"\">"+m[0]+"</div>"
    +nextHtml
    +"</div>";
}

function doConfetti(){
  praise=rnd(PR);
  var cont=document.createElement("div");
  cont.id="confettiCont";
  for(var i=0;i<20;i++){
    var d=document.createElement("div");
    d.style.cssText="position:fixed;top:-20px;left:"+Math.random()*100+"%;font-size:18px;opacity:0;pointer-events:none;z-index:200;animation:confettiFall 2s ease-in "+Math.random()*0.5+"s forwards";
    d.textContent=rnd(SHP);
    cont.appendChild(d);
  }
  var p=document.createElement("div");
  p.style.cssText="position:fixed;top:30%;left:50%;font-size:clamp(20px,6vw,32px);font-weight:900;color:#FF69B4;text-shadow:0 2px 10px rgba(255,105,180,.3);animation:praiseFloat 2s ease-out forwards;z-index:150;pointer-events:none;white-space:nowrap";
  p.textContent=praise;
  cont.appendChild(p);
  document.body.appendChild(cont);
  if(cfTimer)clearTimeout(cfTimer);
  cfTimer=setTimeout(function(){var c=document.getElementById("confettiCont");if(c)c.remove();},2500);
}

function genQuiz(){
  var gs=getGroups(),all=[];
  gs.forEach(function(g){all=all.concat(getChars(g));});
  var t=rnd(all),rv=R[t],opts=[rv],ar=allRomaji();
  while(opts.length<4){var x=rnd(ar);if(opts.indexOf(x)===-1)opts.push(x);}
  opts.sort(function(){return Math.random()-.5;});
  qCh=t;qOpts=opts;qRes=null;
}

function render(){
  var app=document.getElementById("app");
  var gs=getGroups();
  var chars=getChars(gs[grp]);
  if(!ch)ch=chars[0];
  var h="";

  h+="<div style=\"position:absolute;top:20px;left:10%;font-size:20px;animation:sparkle 3s infinite;pointer-events:none;opacity:.5\">✨</div>";
  h+="<div style=\"position:absolute;top:60px;right:8%;font-size:16px;animation:sparkle 4s infinite 1s;pointer-events:none;opacity:.4\">💎</div>";

  h+="<div style=\"text-align:center;margin-bottom:10px\">";
  h+="<div style=\"font-size:28px;animation:tiaraGlow 2s infinite;margin-bottom:-8px\">👑</div>";
  h+="<div style=\"font-size:clamp(22px,6vw,34px);font-weight:900;margin:0 0 2px;background:linear-gradient(135deg,#FF69B4,#B388FF,#FF69B4,#FFD700);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:float 3s ease-in-out infinite;letter-spacing:3px\">プリンセス もじランド</div>";
  h+="<div style=\"font-size:13px;color:#C9A0DC;font-weight:700\">🌸 まほうの もじを おぼえよう！ 🌸</div>";
  h+="</div>";

  h+="<div style=\"display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap\">";
  var modes=[["hiragana","ひらがな","🌸"],["katakana","カタカナ","⭐"],["quiz","クイズ","👑"]];
  for(var i=0;i<modes.length;i++){
    var m=modes[i],ac=(m[0]==="quiz")?isQuiz:(mode===m[0]&&!isQuiz);
    h+="<button data-mode=\""+m[0]+"\" style=\"padding:10px 20px;border-radius:50px;font-size:clamp(14px,3.5vw,17px);font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;";
    if(ac)h+="border:none;background:linear-gradient(135deg,#FF69B4,#B388FF);color:#fff;box-shadow:0 4px 15px rgba(255,105,180,.4)";
    else h+="border:2px solid #FFD6EB;background:rgba(255,255,255,.8);color:#C9A0DC";
    h+="\">"+m[2]+" "+m[1]+"</button>";
  }
  h+="</div>";

  if(isQuiz){
    h+="<div style=\"max-width:500px;margin:0 auto;text-align:center\">";
    h+="<div style=\"display:flex;justify-content:center;gap:16px;margin-bottom:16px\">";
    h+="<div style=\"background:rgba(255,255,255,.9);border-radius:16px;padding:8px 20px;box-shadow:0 2px 10px rgba(255,105,180,.15);border:2px solid #FFD6EB\"><div style=\"font-size:12px;color:#C9A0DC;font-weight:700\">💎 スコア</div><div style=\"font-size:28px;font-weight:900;color:#FF69B4\">"+score+"</div></div>";
    h+="<div style=\"background:rgba(255,255,255,.9);border-radius:16px;padding:8px 20px;box-shadow:0 2px 10px rgba(179,136,255,.15);border:2px solid #E8D5F5\"><div style=\"font-size:12px;color:#C9A0DC;font-weight:700\">🔥 れんぞく</div><div style=\"font-size:28px;font-weight:900;color:#B388FF\">"+streak+(streak>=5?" 👸":streak>=3?" 👑":streak>=2?" ✨":"")+"</div></div>";
    h+="</div>";
    h+="<div style=\"background:rgba(255,255,255,.92);border-radius:24px;padding:24px;box-shadow:0 4px 20px rgba(255,105,180,.12);border:2px solid #FFD6EB;margin-bottom:16px;animation:"+(qRes==="wrong"?"shake .5s":"popIn .4s ease-out")+"\">";
    h+="<div style=\"font-size:15px;color:#C9A0DC;margin:0 0 4px;font-weight:700\">🪄 このもじは な〜に？</div>";
    h+="<div style=\"font-family:'YuKyokasho Yoko','YuKyokasho','Klee One',serif;font-size:clamp(80px,20vw,120px);font-weight:600;line-height:1.2;color:#FF69B4;animation:bounce 2s ease-in-out infinite;text-shadow:0 4px 15px rgba(255,105,180,.2)\">"+qCh+"</div>";
    if(qRes==="correct")h+="<div style=\"font-size:22px;color:#FF69B4;font-weight:900;animation:popIn .3s;margin-top:4px\">"+praise+"</div>";
    h+="</div>";
    h+="<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">";
    for(var i=0;i<qOpts.length;i++){
      var o=qOpts[i],ok=qRes&&o===R[qCh];
      h+="<button data-ans=\""+i+"\" style=\"padding:16px;border-radius:16px;border:3px solid "+(ok?"#FF69B4":"#FFD6EB")+";background:"+(ok?"linear-gradient(135deg,#FFF0F5,#FFE4F0)":"rgba(255,255,255,.9)")+";font-size:clamp(20px,5vw,28px);font-weight:700;cursor:pointer;font-family:inherit;color:#666\">"+o+"</button>";
    }
    h+="</div>";
    h+="<button data-back=\"1\" style=\"margin-top:16px;padding:10px 24px;border-radius:50px;border:2px solid #FFD6EB;background:rgba(255,255,255,.8);font-size:14px;cursor:pointer;font-family:inherit;color:#C9A0DC;font-weight:700\">🌸 もどる</button>";
    h+="</div>";
  } else {
    h+="<div style=\"margin-bottom:12px\">";
    h+="<div style=\"display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:4px 0 6px\">";
    for(var i=0;i<gs.length;i++){
      var ac=grp===i;
      var isDaku=gs[i][0].charAt(0).match(/[がざだばぱガザダバパ]/);
      if(i>0&&isDaku&&!gs[i-1][0].charAt(0).match(/[がざだばぱガザダバパ]/)){
        h+="</div><div style=\"text-align:center;font-size:11px;color:#C9A0DC;font-weight:700;padding:2px 0\">🌟 だくてん・はんだくてん 🌟</div><div style=\"display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:2px 0 4px\">";
      }
      h+="<button data-grp=\""+i+"\" style=\"padding:7px 12px;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;";
      if(ac)h+="background:linear-gradient(135deg,"+GC[i%GC.length]+","+GC[(i+1)%GC.length]+");color:#fff;border:none;box-shadow:0 3px 12px "+GC[i%GC.length]+"44";
      else h+="background:rgba(255,255,255,.7);color:#C9A0DC;border:2px solid #FFD6EB";
      h+="\">"+gs[i][0]+"</button>";
    }
    h+="</div></div>";

    h+="<div style=\"display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px\">";
    for(var i=0;i<chars.length;i++){
      var c=chars[i],sl=ch===c,gc=GC[grp%GC.length];
      h+="<button data-ch=\""+i+"\" style=\"width:clamp(56px,15vw,68px);height:clamp(56px,15vw,68px);border-radius:18px;border:3px solid "+(sl?gc:"#FFE4F0")+";background:"+(sl?"#fff":"rgba(255,255,255,.7)")+";font-size:clamp(28px,7vw,36px);font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;color:"+(sl?gc:"#999")+";"+(sl?"animation:wiggle .5s;box-shadow:0 4px 15px "+gc+"44":"box-shadow:0 2px 6px rgba(255,105,180,.08)")+"\">"+c+"</button>";
    }
    h+="</div>";

    if(ch){
      var gc=GC[grp%GC.length];
      h+="<div style=\"background:rgba(255,255,255,.92);border-radius:24px;padding:16px;box-shadow:0 4px 24px rgba(255,105,180,.12);border:2px solid #FFE4F0;max-width:560px;margin:0 auto 16px;animation:popIn .4s ease-out\">";
      h+="<div style=\"text-align:center;margin-bottom:12px\">";
      h+="<div style=\"font-family:'YuKyokasho Yoko','YuKyokasho','Klee One',serif;font-size:clamp(64px,18vw,100px);font-weight:600;line-height:1.1;animation:bounce 2s ease-in-out infinite;color:"+gc+";text-shadow:0 4px 15px "+gc+"33\">"+ch+"</div>";
      h+="<div style=\"font-size:clamp(18px,5vw,24px);color:#B388FF;font-weight:700;margin-bottom:6px\">"+R[ch]+"</div>";
      h+="<div style=\"text-align:center\"><span style=\"font-size:clamp(13px,3.5vw,17px);color:#666;background:linear-gradient(135deg,#FFF0F5,#F0E6FF);display:inline-block;padding:8px 18px;border-radius:50px;border:1px solid #FFE4F0;font-weight:700;line-height:1.5\">"+(WD[ch]||ch)+"</span></div>";
      h+="</div>";

      h+="<div style=\"position:relative;margin-top:14px\">";
      h+="<div style=\"text-align:center;font-size:14px;color:#C9A0DC;margin:0 0 8px;font-weight:700\">🪄 ゆびで まほうの もじを かこう！</div>";
      h+="<div style=\"position:relative;max-width:"+CW+"px;margin:0 auto\">";
      h+="<canvas id=\"dc\" width=\""+CW+"\" height=\""+CW+"\" style=\"width:100%;max-width:"+CW+"px;height:auto;aspect-ratio:1;background:linear-gradient(135deg,#FFF9FC,#FFF5F9);border-radius:20px;border:3px dashed #FFB6D9;touch-action:none;cursor:crosshair;display:block;margin:0 auto\"></canvas>";
      h+="<button data-clear=\"1\" style=\"position:absolute;top:8px;right:8px;background:rgba(255,255,255,.95);border:2px solid #FFB6D9;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(255,105,180,.2);z-index:10\">🗑️</button>";
      h+="<div id=\"judgeArea\" style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;z-index:20;pointer-events:none\"></div>";
      h+="</div>";
      h+="</div>";

      // judge button
      h+="<div style=\"text-align:center;margin-top:12px\">";
      h+="<button data-judge=\"1\" style=\"padding:14px 32px;border-radius:50px;border:none;background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;font-size:clamp(16px,4vw,20px);font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 15px rgba(255,215,0,.4);transition:all .2s\">🪄 まほうで チェック！</button>";
      h+="</div>";

      // pen colors
      h+="<div style=\"display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap\">";
      for(var i=0;i<PCS.length;i++){
        var c=PCS[i],sl=penCol===c;
        h+="<div data-pen=\""+i+"\" style=\"width:32px;height:32px;border-radius:50%;cursor:pointer;background:"+c+";border:"+(sl?"3px solid #FFD700":"2px solid #FFE4F0")+";transform:"+(sl?"scale(1.2)":"scale(1)")+";box-shadow:"+(sl?"0 0 8px rgba(255,215,0,.5)":"none")+"\"></div>";
      }
      h+="<div style=\"margin-left:8px;display:flex;gap:6px;align-items:center\">";
      var szs=[4,6,10];
      for(var i=0;i<szs.length;i++){
        var s=szs[i],sl=penSz===s;
        h+="<div data-psz=\""+i+"\" style=\"width:"+(s+20)+"px;height:"+(s+20)+"px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;border:"+(sl?"2px solid #FF69B4":"2px solid #FFE4F0")+";background:"+(sl?"#FFF0F5":"#fff")+"\"><div style=\"width:"+s+"px;height:"+s+"px;border-radius:50%;background:#FF69B4\"></div></div>";
      }
      h+="</div></div>";
      h+="</div>";
    }
  }

  h+="<div style=\"text-align:center;padding:16px 0 8px;font-size:12px;color:#DDA0DD;font-weight:700\">👑 プリンセス もじランド 🌸</div>";
  app.innerHTML=h;

  if(!isQuiz&&ch)setupCanvas();
}

document.getElementById("app").addEventListener("click",function(e){
  var t=e.target;
  while(t&&t!==this){
    if(t.dataset){
      if(t.dataset.mode!==undefined){
        var m=t.dataset.mode;
        if(m==="quiz"){isQuiz=true;score=0;streak=0;genQuiz();}
        else{mode=m;isQuiz=false;grp=0;ch=null;}
        judgeResult=null;if(judgeTimer)clearTimeout(judgeTimer);render();return;
      }
      if(t.dataset.grp!==undefined){grp=parseInt(t.dataset.grp);ch=getChars(getGroups()[grp])[0];judgeResult=null;if(judgeTimer)clearTimeout(judgeTimer);render();return;}
      if(t.dataset.ch!==undefined){var idx=parseInt(t.dataset.ch);ch=getChars(getGroups()[grp])[idx];judgeResult=null;if(judgeTimer)clearTimeout(judgeTimer);render();return;}
      if(t.dataset.ans!==undefined){
        if(qRes)return;
        var a=qOpts[parseInt(t.dataset.ans)];
        if(a===R[qCh]){qRes="correct";score++;streak++;doConfetti();setTimeout(function(){genQuiz();render();},1400);}
        else{qRes="wrong";streak=0;render();setTimeout(function(){qRes=null;render();},1000);}
        return;
      }
      if(t.dataset.back!==undefined){isQuiz=false;render();return;}
      if(t.dataset.clear!==undefined){drawGuide();if(judgeTimer)clearTimeout(judgeTimer);var ja=document.getElementById("judgeArea");if(ja)ja.innerHTML="";return;}
      if(t.dataset.pen!==undefined){penCol=PCS[parseInt(t.dataset.pen)];render();return;}
      if(t.dataset.psz!==undefined){penSz=[4,6,10][parseInt(t.dataset.psz)];render();return;}
      if(t.dataset.judge!==undefined){judgeHandwriting();return;}
    }
    t=t.parentElement;
  }
});

if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){render();});}else{render();}
})();
</script>
</body>
</html>
